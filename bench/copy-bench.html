<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>_copy Benchmark Comparison</title>
  <script src="https://cdn.plot.ly/plotly-2.18.1.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      padding: 20px;
    }

    #benchmarkChart {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <div id="benchmarkChart"></div>

  <script>
    // Setup function
    function setup() {
      const size = 100000;
      const input = new Float32Array(size);
      const output = new Float32Array(size);
      const offset_input = 0;
      const offset_output = 0;
      input.forEach((_, i) => input[i] = Math.random());
      return { size, input, offset_input, output, offset_output };
    }

    // Technique 1: Unrolled loop
    function technique1(data) {
      const unrollFactor = 16;
      const { size, input, offset_input, offset_output, output } = data;
      let i = 0;

      for (; i <= size - unrollFactor; i += unrollFactor) {
        output[offset_output + i] = input[offset_input + i];
        output[offset_output + i + 1] = input[offset_input + i + 1];
        output[offset_output + i + 2] = input[offset_input + i + 2];
        output[offset_output + i + 3] = input[offset_input + i + 3];
        output[offset_output + i + 4] = input[offset_input + i + 4];
        output[offset_output + i + 5] = input[offset_input + i + 5];
        output[offset_output + i + 6] = input[offset_input + i + 6];
        output[offset_output + i + 7] = input[offset_input + i + 7];
        output[offset_output + i + 8] = input[offset_input + i + 8];
        output[offset_output + i + 9] = input[offset_input + i + 9];
        output[offset_output + i + 10] = input[offset_input + i + 10];
        output[offset_output + i + 11] = input[offset_input + i + 11];
        output[offset_output + i + 12] = input[offset_input + i + 12];
        output[offset_output + i + 13] = input[offset_input + i + 13];
        output[offset_output + i + 14] = input[offset_input + i + 14];
        output[offset_output + i + 15] = input[offset_input + i + 15];
      }

      for (; i < size; i++) {
        output[offset_output + i] = input[offset_input + i];
      }
    }

    // Technique 2: Baseline loop
    function technique2(data) {
      const { size, input, offset_input, offset_output, output } = data;
      for (let i = 0; i < size; i++) {
        output[offset_output + i] = input[offset_input + i];
      }
    }

    // Benchmark runner
    function runBenchmark(technique, iterations_inner, iterations_outer, offset) {
      const timings = [];

      for (let i = 0; i < iterations_outer; i++) {
        const data = setup(offset);
        const start = performance.now();
        for (let j = 0; j < iterations_inner; j++) {
          technique(data);
        }
        const end = performance.now();
        timings.push((end - start) * 1000);
      }

      return timings;
    }

    function filterOutliers(timings) {
      const sorted = [...timings].sort((a, b) => a - b);
      const q1 = sorted[Math.floor(sorted.length * 0.25)];
      const q3 = sorted[Math.floor(sorted.length * 0.75)];
      const iqr = q3 - q1;
      const lowerBound = q1 - 1.5 * iqr;
      const upperBound = q3 + 1.5 * iqr;

      return timings.filter(t => t >= lowerBound && t <= upperBound);
    }

    const timings1 = filterOutliers(runBenchmark(technique1, 1000, 10, 0));
    const timings2 = filterOutliers(runBenchmark(technique2, 1000, 10, 0));
    const timings3 = filterOutliers(runBenchmark(technique1, 1000, 10, 4));
    const timings4 = filterOutliers(runBenchmark(technique2, 1000, 10, 4));

    const data = [
      {
        x: timings1,
        type: 'histogram',
        name: 'unrolled',
        opacity: 0.7
      },
      {
        x: timings2,
        type: 'histogram',
        name: 'scalar',
        opacity: 0.7
      },
      {
        x: timings3,
        type: 'histogram',
        name: 'unrolled + offset',
        opacity: 0.7
      },
      {
        x: timings4,
        type: 'histogram',
        name: 'scalar + offset',
        opacity: 0.7
      }
    ];

    const layout = {
      title: '_copy Benchmark Performance Comparison',
      xaxis: {
        title: 'Time (us)',
        showgrid: true
      },
      yaxis: {
        title: 'Frequency',
        showgrid: true
      },
      barmode: 'overlay',
      legend: { orientation: 'h', x: 0.5, xanchor: 'center', y: 1.1 }
    };

    Plotly.newPlot('benchmarkChart', data, layout);
  </script>
</body>

</html>
